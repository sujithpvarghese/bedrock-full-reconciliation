service: ecommerce-diagnostic-agent

frameworkVersion: "3"

provider:
  name: aws
  runtime: nodejs18.x
  region: us-east-1
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - bedrock:InvokeModel
            - bedrock:InvokeAgent
          Resource: "*"

functions:
  chat:
    handler: src/handlers/chat.handler
    environment:
      AGENT_ID: !Ref DiagnosticAgent
      AGENT_ALIAS_ID: !GetAtt DiagnosticAgentAlias.AgentAliasId

  executor:
    handler: src/handlers/executor.handler

resources:
  Resources:
    DiagnosticAgentRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: !Sub "${AWS::StackName}-DiagnosticAgentRole"
        AssumeRolePolicyDocument:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Principal:
                Service: bedrock.amazonaws.com
              Action: sts:AssumeRole
              Condition:
                StringEquals:
                  aws:SourceAccount: !Ref AWS::AccountId
                ArnLike:
                  aws:SourceArn: !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:agent/*"
        Policies:
          - PolicyName: BedrockAgentPolicy
            PolicyDocument:
              Version: "2012-10-17"
              Statement:
                - Effect: Allow
                  Action: bedrock:InvokeModel
                  Resource: !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-3-sonnet-20240229-v1:0"

    DiagnosticAgent:
      Type: AWS::Bedrock::Agent
      Properties:
        AgentName: !Sub "${AWS::StackName}-DiagnosticAgent"
        FoundationModel: "anthropic.claude-3-sonnet-20240229-v1:0"
        AgentResourceRoleArn: !GetAtt DiagnosticAgentRole.Arn
        Instruction: >
          You are an E-Commerce Diagnostic Assistant for business users. Your goal is to autonomously diagnose and REPAIR data discrepancies. 
          When a user asks why a product (starts with 'prod_') or style (5-8 digits) is not sellable or is "stuck":
          
          1. **Diagnose Web State**: ALWAYS begin by calling `checkWebDatabase` to identify current missing or incorrect data (inventory, price, or product name).
          2. **Investigate Root Cause**:
             - Use `checkInventoryService`, `checkPricingEngine`, or `checkPimService` to compare Web state with the source of truth.
             - If a sync appears stuck, use `checkQueueHealth` (to see backlogs) and `checkDeadLetterQueue` (to find fatal errors).
          3. **Handle Technical Errors (RAG)**:
             - If `checkDeadLetterQueue` returns an error code (e.g., 'ERR_INV_404', 'ERR_METADATA_INCOMPLETE') or an exception name, call `queryTroubleshootingGuide` with that code.
             - Follow the "RESOLUTION" suggested by the guide (e.g., triggering a specific sync or notifying a team).
          4. **Standard Remediation**: If the upstream system is correct but the Web Database is outdated, call `syncSystem` for that specific system.
          5. **Verify Fix**: After any remediation action, ALWAYS call `checkWebDatabase` again to verify that the discrepancy has been resolved.
          6. **Report Clearly**: Explain what was found, what cause was identified (e.g., quoting the troubleshooting guide), and confirm any actions taken.
        IdleSessionTTLInSeconds: 1800

    DiagnosticActionGroup:
      Type: AWS::Bedrock::AgentActionGroup
      DependsOn:
        - ExecutorPermissionForBedrock
      Properties:
        AgentId: !Ref DiagnosticAgent
        AgentVersion: "DRAFT"
        ActionGroupName: DiagnosticActions
        ActionGroupExecutor:
          Lambda: !GetAtt ExecutorLambdaFunction.Arn
        FunctionSchema:
          Functions:
            - Name: checkWebDatabase
              Description: Checks the Web Database for a product's current sellability status.
              Parameters:
                identifier:
                  Type: string
                  Description: The productId or styleId to check.
                  Required: true
            - Name: checkInventoryService
              Description: Checks the upstream Inventory Service for the actual stock count using the skuId.
              Parameters:
                styleId:
                  Type: string
                  Description: The 5-8 digit styleId.
                  Required: true
            - Name: checkPricingEngine
              Description: Checks the canonical Pricing Engine for the current item price using the skuId.
              Parameters:
                productId:
                  Type: string
                  Description: The productId starting with 'prod_'.
                  Required: true
            - Name: checkPimService
              Description: Checks the canonical PIM Service (S3) for product content completeness using the styleId.
              Parameters:
                productId:
                  Type: string
                  Description: The 5-8 digit styleId.
                  Required: true
            - Name: syncSystem
              Description: Triggers a sync from upstream to Web for a specific system (inventory, price, or pim).
              Parameters:
                identifier:
                  Type: string
                  Description: The productId or styleId.
                  Required: true
                system:
                  Type: string
                  Description: The system to sync (inventory, price, or pim).
                  Required: true
            - Name: checkQueueHealth
              Description: Checks the SQS Queue backlog for the given target system.
              Parameters:
                targetSystem:
                  Type: string
                  Description: The name of the upstream system (inventory, price, or pim).
                  Required: true
            - Name: checkDeadLetterQueue
              Description: Checks the DLQ to see if a recent sync for a specific product critically failed.
              Parameters:
                identifier:
                  Type: string
                  Description: The productId or styleId.
                  Required: true
            - Name: queryTroubleshootingGuide
              Description: Queries the internal knowledge base for technical error codes to find resolutions.
              Parameters:
                errorCode:
                  Type: string
                  Description: The technical error code (e.g., ERR_INV_404).
                  Required: true

    ExecutorPermissionForBedrock:
      Type: AWS::Lambda::Permission
      Properties:
        Action: lambda:InvokeFunction
        FunctionName: !GetAtt ExecutorLambdaFunction.Arn
        Principal: bedrock.amazonaws.com
        SourceArn: !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:agent/*"

    DiagnosticAgentAlias:
      Type: AWS::Bedrock::AgentAlias
      DependsOn:
        - DiagnosticActionGroup
      Properties:
        AgentId: !Ref DiagnosticAgent
        AgentAliasName: "v1"
